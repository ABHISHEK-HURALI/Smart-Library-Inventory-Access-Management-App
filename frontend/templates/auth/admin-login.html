{% extends 'base.html' %}
{% block content %}
<div class="container min-vh-100 d-flex align-items-center justify-content-center">
    <div class="card shadow-lg" style="width: 400px; border-radius: 20px;">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <i class="fas fa-user-shield fa-3x" style="color: #1A365D;"></i>
                <h2 class="mt-3" style="color: #1A365D;">Admin Login</h2>
                <p class="text-muted">Library Management System</p>
            </div>
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" id="username" class="form-control" placeholder="Enter admin username" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100" style="background: #1A365D;">Login</button>
            </form>
            <p class="text-center mt-3">Don't have admin account? <a href="/api/admin/register/">Register</a></p>
        </div>
    </div>
</div>

<script>
document.getElementById('loginForm').onsubmit = async (e) => {
    e.preventDefault();
    const response = await fetch('/api/admin/login/', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
        })
    });
    const data = await response.json();
    if (response.ok) {
        window.location.href = '/api/admin/dashboard/';
    } else {
        alert(data.error);
    }
};
</script>
{% endblock %}
